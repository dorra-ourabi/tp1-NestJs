
<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 20px auto; }
    #chat { border: 1px solid #ddd; padding: 10px; min-height: 200px; margin: 10px 0; border-radius: 8px; }
    .message { padding: 6px 10px; margin: 4px 0; border-radius: 8px; position: relative; }
    .message.user { background: #e3f2fd; }
    .message.admin { background: #f3e5f5; }
    .message .emojis { margin-top: 4px; font-size: 18px; cursor: pointer; }
    .message .reactions { font-size: 13px; margin-top: 4px; }
    #typing { color: gray; font-style: italic; min-height: 20px; font-size: 13px; }
    #status { font-size: 13px; margin-bottom: 8px; }
    .online { color: green; }
    .offline { color: gray; }
    .seen { font-size: 11px; color: #888; text-align: right; }
    .controls { display: flex; gap: 8px; }
    #msgInput { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #ddd; }
    button { padding: 8px 14px; border-radius: 6px; border: none; background: #1976d2; color: white; cursor: pointer; }
  </style>
</head>
<body>

  <!-- change this config for each file -->
  <script>
    const CONFIG = {
      token: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjYsInVzZXJuYW1lIjoieWFzYSIsInJvbGUiOiJ1c2VyIiwiaWF0IjoxNzc3NzAxNjA1LCJleHAiOjE3Nzc3MDUyMDV9.72n-V9KGThaeWB5cp8b4gEFp7YRk1cmqxnRmRFar0hs',
      userId: 6,          // the thread userId (always the candidate)
      myRole: 'user',     // 'user' or 'admin'
      myName: 'mamy',     // your username
    };
  </script>

  <h3 id="title"></h3>
  <div id="status"></div>

  <div id="chat"></div>
  <div id="typing"></div>

  <div class="controls">
    <input id="msgInput" placeholder="type a message" />
    <button onclick="send()">Send</button>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    document.getElementById('title').textContent =
      `${CONFIG.myName} (${CONFIG.myRole})`;

    const socket = io('http://localhost:3000', {
      auth: { token: CONFIG.token },
      transports: ['websocket'],
    });

    // track messages for reactions
    const messages = {};
    let typingTimer;

    socket.on('connect', () => {
      console.log('connected!', socket.id);
      socket.emit('join', { userId: CONFIG.userId });
    });

    socket.on('joined', (data) => {
      console.log('joined room:', data.room);
      // mark messages as read when joining
      socket.emit('markRead', { userId: CONFIG.userId });
    });

    // incoming message
    socket.on('message', (data) => {
      messages[data.id] = data;
      renderMessage(data);
      // mark as read immediately when message arrives
      socket.emit('markRead', { userId: CONFIG.userId });
    });

    // typing indicator
    socket.on('typing', (data) => {
      const el = document.getElementById('typing');
      if (data.isTyping) {
        el.textContent = `${data.username} is typing...`;
      } else {
        el.textContent = '';
      }
    });

    // read receipts
    socket.on('messagesRead', (data) => {
      // add "seen" under the last message
      const allMessages = document.querySelectorAll('.message');
      if (allMessages.length > 0) {
        const last = allMessages[allMessages.length - 1];
        let seen = last.querySelector('.seen');
        if (!seen) {
          seen = document.createElement('div');
          seen.className = 'seen';
          last.appendChild(seen);
        }
        seen.textContent = `seen by ${data.byUser}`;
      }
    });

    // emoji reactions
    socket.on('reaction', (data) => {
      const msgEl = document.getElementById(`msg-${data.messageId}`);
      if (msgEl) {
        let reactionsEl = msgEl.querySelector('.reactions');
        if (!reactionsEl) {
          reactionsEl = document.createElement('div');
          reactionsEl.className = 'reactions';
          msgEl.appendChild(reactionsEl);
        }
        reactionsEl.textContent += ` ${data.emoji} ${data.fromUser}`;
      }
    });

    // online/offline status
    socket.on('userStatus', (data) => {
      const el = document.getElementById('status');
      const dot = data.isOnline ? '🟢' : '⚪';
      const cls = data.isOnline ? 'online' : 'offline';
      el.innerHTML = `<span class="${cls}">${dot} ${data.username} (${data.role}) is ${data.isOnline ? 'online' : 'offline'}</span>`;
    });

    // typing detection
    document.getElementById('msgInput').addEventListener('input', () => {
      socket.emit('typing', { userId: CONFIG.userId, isTyping: true });
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => {
        socket.emit('typing', { userId: CONFIG.userId, isTyping: false });
      }, 1000); // stop typing after 1s of no input
    });

    function renderMessage(data) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = `message ${data.fromRole}`;
      div.id = `msg-${data.id}`;
      div.innerHTML = `
        <b>${data.fromRole}</b>: ${data.content}
        <div class="emojis">
          <span onclick="react(${data.id}, '👍')">👍</span>
          <span onclick="react(${data.id}, '❤️')">❤️</span>
          <span onclick="react(${data.id}, '😂')">😂</span>
        </div>
        <div class="reactions"></div>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function react(messageId, emoji) {
      socket.emit('react', {
        userId: CONFIG.userId,
        messageId,
        emoji,
      });
    }

    function send() {
      const content = document.getElementById('msgInput').value.trim();
      if (!content) return;
      socket.emit('message', { userId: CONFIG.userId, content });
      document.getElementById('msgInput').value = '';
      // stop typing indicator
      socket.emit('typing', { userId: CONFIG.userId, isTyping: false });
    }

    // send on Enter key
    document.getElementById('msgInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') send();
    });
  </script>
</body>
</html>
